<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irida Center - Новости</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/news.css">
</head>
<body class="simple-page news-page">
    <div class="wrapper">
        <div class="Logo">
            <a href="../index.html">
                <img src="../img/Logo.png" alt="">
            </a>
        </div>

        <header class="container">
            <div class="header-right">
                <nav>
                    <ul>
                        <li><a href="../index.html">ГЛАВНАЯ</a></li>
                        <li><a href="services.html">УСЛУГИ</a></li>
                        <li class="active"><a href="news.html">НОВОСТИ</a></li>
                        <li><a href="reviews.html">ОТЗЫВЫ</a></li>
                        <li><a href="profile.html">ПРОФИЛЬ</a></li>
                        <li><a href="blog.html">БЛОГ</a></li>
                    </ul>
                </nav>
                <button class="phone-copy" type="button" data-copy="+7 (910) 832-04-34">
                    + 7 (910) 832-04-34
                </button>
                <p class="work-time">Ежедневно с 10:00 до 21:00</p>
            </div>
        </header>

        <main class="news-shell container" data-news-root>
            <section class="news-layout">
                <div class="news-layout__hero">
                    <div class="news-feed__header">
                        <div>
                            <p class="news-panel__kicker">Лента новостей</p>
                            <h2>Свежие публикации</h2>
                        </div>
                        <div class="news-feed__meta" id="news-feed-meta">Загрузка ленты...</div>
                    </div>

                    <div class="news-status" id="news-status" aria-live="polite"></div>
                </div>

                <aside class="news-sidebar">
                    <h2 id="news-user-title" hidden></h2>
                    <p id="news-user-description" hidden></p>

                    <div class="news-toolbar">
                        <button class="news-refresh" id="refresh-feed-button" type="button">Обновить ленту</button>
                    </div>

                    <section class="news-panel news-composer" id="news-composer" hidden>
                        <div class="news-panel__header">
                            <div>
                                <p class="news-panel__kicker">Публикация администратора</p>
                                <h2>Новая новость</h2>
                            </div>
                        </div>

                        <form class="news-composer__form" id="news-post-form">
                            <label class="news-field">
                                <span>Заголовок</span>
                                <input type="text" name="title" placeholder="Например: новая зона ожидания для клиентов" minlength="3" maxlength="140" required>
                            </label>

                            <label class="news-field">
                                <span>Текст новости</span>
                                <textarea name="content" rows="7" placeholder="Напиши текст публикации..." minlength="10" maxlength="10000" required></textarea>
                            </label>

                            <label class="news-field">
                                <span>Фотография</span>
                                <input type="file" name="image" accept=".jpg,.jpeg,.png,.webp,.gif">
                            </label>

                            <label class="news-checkbox">
                                <input type="checkbox" name="is_published" checked>
                                <span>Опубликовать сразу</span>
                            </label>

                            <button class="news-submit" type="submit">Опубликовать новость</button>
                        </form>
                    </section>
                </aside>

                <section class="news-feed">
                    <div class="news-feed__list" id="news-feed-list"></div>
                </section>
            </section>
        </main>
    </div>

    <script src="../js/site-config.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/news-feed.js"></script>
    <script src="../js/news-admin-edit.js"></script>
</body>
</html>
