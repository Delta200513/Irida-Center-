<!DOCTYPE html>

    <title>Irida Center - Услуги</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="simple-page services-page">

        <header class="container">
            <div class="header-right">

                    <ul>
                        <li><a href="index.html">ГЛАВНАЯ</a></li>
